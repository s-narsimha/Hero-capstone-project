apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mongo
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: 'https://github.com/saiyedin786/Hero-capstone-project.git'
    targetRevision: HEAD
    path: kubernetes/helm/charts/mongo
    helm:
      valueFiles: []
      releaseName: mongo
  destination:
    server: 'https://F4D8E85478EED3B8B2F32FACA4A6A8E7.gr7.ap-south-1.eks.amazonaws.com'
    namespace: shopnow-demo
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
